# Creates a GitHub Release whenever a version tag (v*) is pushed.
# Release notes are extracted from the matching section in CHANGELOG.md
# so each release shows only what changed in that version.
#
# To publish a release:
#   git tag v0.9.8
#   git push origin v0.9.8

name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g., v0.9.72)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Extract release notes for this version
        id: notes
        run: |
          # Pull the changelog block that starts with the pushed tag version.
          # Captures everything between the matching ## [vX.Y.Z] heading and
          # the next ## heading (exclusive), stripping leading/trailing blank lines.
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${TAG#v}"  # strip leading 'v' for matching [0.9.8] style entries
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md \
                  | sed '/./,$!d' | sed -e :a -e '/^\n*$/{$d;N;ba}')
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          # Write to a temp file to handle multi-line content safely
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file /tmp/release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
